name: Normal RDP

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Step 1 - Enable RDP (security ON)
        run: |
          Write-Host "Enabling Remote Desktop with secure settings..."

          # RDP connections allow karein
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force

          # Network Level Authentication ON rakhein (secure). 1 = ON
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1 -Force

          # Firewall disable NAHI karte - sirf RDP ke liye rule enable karte hain
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue

          Restart-Service -Name TermService -Force -ErrorAction SilentlyContinue
          Write-Host "RDP enabled."

      - name: Step 2 - Create RDP user
        run: |
          # Password ko hardcode karne ke bajaye repo Secret se uthana behtar hai:
          # Repo -> Settings -> Secrets and variables -> Actions -> RDP_PASSWORD
          $password = "${{ secrets.RDP_PASSWORD }}"
          if ([string]::IsNullOrWhiteSpace($password)) {
              Write-Error "RDP_PASSWORD secret set nahi hai. Pehle repo secrets mein add karein."
              exit 1
          }

          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "RDP" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP" -ErrorAction SilentlyContinue
          Write-Host "User 'RDP' ready."

      - name: Step 3 - Install developer tools (optional)
        run: |
          Write-Host "Installing common dev tools..."
          choco install python nodejs git vscode -y --no-progress

      - name: Step 4 - Install & connect Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait

          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-$env:GITHUB_RUN_ID

          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Step 5 - Keep connection alive
        run: |
          Write-Host "`n=== RDP READY ==="
          Write-Host "Address : $env:TAILSCALE_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: (jo aapne RDP_PASSWORD secret mein set kiya hai)"
          Write-Host "=================`n"

          while ($true) {
              Write-Host "[$(Get-Date)] Session active. Ctrl+C to terminate."
              Start-Sleep -Seconds 300
          }
